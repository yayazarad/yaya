<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="add.css">
    <title>form</title>
</head>
<body>
    <div class="container">
        <div class="title">
            new course
        </div>
        <form action="">
            <label for="course name">course name:</label>
            <input type="text" name="course name" placeholder="course name..." required>
            <label for="instructor">instructor:</label>
            <input type="text" name="instructor name" placeholder="instructor name..." required>
            <label for="notes">notes:</label>
            <textarea placeholder="about course..."></textarea>
            <input type="submit" value="add course">
        </form>
    </div>
    <footer>
        <p>project by mr.YAYA</p>
    </footer>
</body>
</html>
